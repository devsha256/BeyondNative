{% extends "base.html" %}

{% block title %}Bulk PR Configuration{% endblock %}

{% block content %}
<div style="display:flex; justify-content:space-between; align-items:center;">
    <h1>Beyond Native: Bulk PR Configuration</h1>
    <a href="/" class="m3-button" style="background:var(--md-sys-color-surface-variant); color:var(--md-sys-color-on-surface);">
        <i class="material-icons">arrow_back</i> Change Selection
    </a>
</div>

<div class="table-container m3-card" style="padding:0; margin-top:24px;">
    <table class="m3-table">
        <thead>
            <tr style="background: var(--md-sys-color-primary-container);">
                <th style="color: var(--md-sys-color-on-primary-container); padding: 16px;">MASTER CONTROL</th>
                <th>
                    <select class="m3-input" onchange="bulkUpdate('from', this.value)">
                        <option value="">Global Source...</option>
                        <option value="dev">dev</option>
                        <option value="qa">qa</option>
                        <option value="staging">staging</option>
                        <option value="pre-prod">pre-prod</option>
                    </select>
                </th>
                <th>
                    <select class="m3-input" onchange="bulkUpdate('to', this.value)">
                        <option value="">Global Target...</option>
                        <option value="dev">dev</option>
                        <option value="qa">qa</option>
                        <option value="staging">staging</option>
                        <option value="pre-prod">pre-prod</option>
                        <option value="main">main</option>
                    </select>
                </th>
                <th style="text-align:right; padding-right:24px;">
                    <button id="btn-raise-all" class="m3-button" onclick="raiseAll()">
                        <i class="material-icons">rocket_launch</i> Raise All
                    </button>
                </th>
            </tr>
            <tr>
                <th style="padding: 16px;">Repository</th>
                <th>Source (From)</th>
                <th>Target (To)</th>
                <th style="text-align:right; padding-right:24px;">Action</th>
            </tr>
        </thead>
        <tbody id="pr-body"></tbody>
    </table>
</div>

<script>
document.addEventListener('DOMContentLoaded', async () => {
    const repos = JSON.parse(sessionStorage.getItem('selectedRepos') || '[]');
    const tbody = document.getElementById('pr-body');

    if (repos.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:40px;">No repositories selected.</td></tr>';
        return;
    }

    for (const name of repos) {
        try {
            const branchRes = await fetch(`/api/branches/${encodeURIComponent(name)}`);
            const branches = await branchRes.json();

            const row = `
                <tr>
                    <td><strong>${name}</strong></td>
                    <td>
                        <select class="m3-input from-select">
                            ${branches.map(b => `<option value="${b}">${b}</option>`).join('')}
                        </select>
                    </td>
                    <td>
                        <select class="m3-input to-select">
                            ${branches.map(b => `<option value="${b}">${b}</option>`).join('')}
                        </select>
                    </td>
                    <td style="text-align:right; padding-right:24px;">
                        <button class="m3-button" onclick="review('${name}', this)" style="background:none; border:1px solid var(--md-sys-color-primary); color:var(--md-sys-color-primary);">Review</button>
                        <button class="m3-button" onclick="raiseSinglePR('${name}', this)">Raise PR</button>
                    </td>
                </tr>
                <tr id="review-${name}" style="display:none;"><td colspan="4"><div class="expandable-content" id="content-${name}"></div></td></tr>
            `;
            tbody.insertAdjacentHTML('beforeend', row);
        } catch (e) {
            console.error("Error loading repo row:", e);
        }
    }
});

function bulkUpdate(type, val) {
    if(!val) return;
    const selectors = document.querySelectorAll(`.${type}-select`);
    selectors.forEach(s => {
        s.value = val;
        s.style.background = "var(--md-sys-color-surface-variant)";
    });
}

async function review(name, btn) {
    const row = document.getElementById(`review-${name}`);
    const content = document.getElementById(`content-${name}`);
    
    if(row.style.display === 'table-row') { row.style.display = 'none'; return; }
    
    row.style.display = 'table-row';
    content.innerHTML = '<div class="m3-loader">Fetching Azure Details...</div>';
    
    try {
        const response = await fetch(`/api/repo-details?repo=${encodeURIComponent(name)}`);
        if (!response.ok) throw new Error("API Failure");
        const data = await response.json();
        
        content.innerHTML = `
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:24px;">
                <div>
                    <strong><i class="material-icons" style="font-size:14px">history</i> Commits to Merge</strong>
                    <ul style="font-size:12px; margin-top:8px;">${data.commits.map(c => `<li>${c.message}</li>`).join('')}</ul>
                </div>
                <div>
                    <strong><i class="material-icons" style="font-size:14px">description</i> Files Impacted</strong>
                    <div style="display:flex; flex-wrap:wrap; gap:4px; margin-top:8px;">
                        ${data.files.map(f => `<span class="status-badge" style="background:#eee">${f}</span>`).join('')}
                    </div>
                    <div style="margin-top:16px; display:flex; gap:8px;">
                        <button class="m3-button" onclick="raiseSinglePR('${name}', this)">Confirm PR</button>
                        <button class="m3-button" style="background:#eee; color:#333;">Auto-Deploy</button>
                    </div>
                </div>
            </div>
        `;
    } catch (err) {
        content.innerHTML = '<div class="status-badge status-error">Failed to load details.</div>';
    }
}

async function raiseSinglePR(repoName, btn) {
    const row = btn.closest('tr');
    const from = row.querySelector('.from-select').value;
    const to = row.querySelector('.to-select').value;

    btn.disabled = true;
    btn.innerText = "Raising...";

    const res = await fetch('/api/create-pr', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ repo_id: repoName, from_branch: from, to_branch: to })
    });

    if (res.ok) {
        btn.innerHTML = '<i class="material-icons">check</i> Success';
        btn.style.background = "var(--md-sys-color-success)";
    } else {
        btn.innerText = "Failed";
        btn.style.background = "var(--md-sys-color-error)";
    }
}

async function raiseAll() {
    const rows = document.querySelectorAll('#pr-body tr:not(.expand-row)');
    const payload = [];

    rows.forEach(row => {
        payload.push({
            repo_id: row.querySelector('strong').innerText,
            from_branch: row.querySelector('.from-select').value,
            to_branch: row.querySelector('.to-select').value
        });
    });

    const btn = document.getElementById('btn-raise-all');
    btn.disabled = true;
    btn.innerHTML = 'Processing...';

    const res = await fetch('/api/bulk-create-pr', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ operations: payload })
    });

    if (res.ok) {
        alert("Bulk PR operation completed. Check individual statuses.");
        location.reload();
    } else {
        alert("Bulk PR operation failed.");
        btn.disabled = false;
        btn.innerHTML = 'Raise All';
    }
}
</script>
{% endblock %}
