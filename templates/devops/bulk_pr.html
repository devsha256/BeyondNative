{% extends "base.html" %}
{% block content %}
<div style="display:flex; justify-content:space-between; align-items:center;">
    <h1>Bulk PR Configuration</h1>
    <a href="/" class="m3-button" style="background:var(--md-sys-color-surface-variant); color:var(--md-sys-color-on-surface);">
        <i class="material-icons">arrow_back</i> Back
    </a>
</div>

<div class="table-container m3-card" style="padding:0;">
    <table class="m3-table">
        <thead>
            <tr style="background: var(--md-sys-color-primary-container);">
                <th style="color: var(--md-sys-color-on-primary-container);">MASTER CONTROL</th>
                <th>
                    <select class="m3-input" onchange="bulkUpdate('from', this.value)">
                        <option value="">Set All From...</option>
                        <option value="develop">develop</option>
                    </select>
                </th>
                <th>
                    <select class="m3-input" onchange="bulkUpdate('to', this.value)">
                        <option value="">Set All To...</option>
                        <option value="main">main</option>
                    </select>
                </th>
                <th style="text-align:right; padding-right:24px;">
                    <button class="m3-button" onclick="raiseAll()">Raise All</button>
                </th>
            </tr>
        </thead>
        <tbody id="pr-body"></tbody>
    </table>
</div>

<script>
document.addEventListener('DOMContentLoaded', async () => {
    const repos = JSON.parse(sessionStorage.getItem('selectedRepos') || '[]');
    const tbody = document.getElementById('pr-body');

    for (const name of repos) {
        const branchRes = await fetch(`/api/branches/${name}`);
        const branches = await branchRes.json();

        const row = `
            <tr>
                <td><strong>${name}</strong></td>
                <td>
                    <select class="m3-input from-select">
                        ${branches.map(b => `<option value="${b}" ${b==='develop'?'selected':''}>${b}</option>`).join('')}
                    </select>
                </td>
                <td>
                    <select class="m3-input to-select">
                        ${branches.map(b => `<option value="${b}" ${b==='main'?'selected':''}>${b}</option>`).join('')}
                    </select>
                </td>
                <td style="text-align:right; padding-right:24px;">
                    <button class="m3-button" onclick="review('${name}', this)" style="background:none; border:1px solid var(--md-sys-color-primary); color:var(--md-sys-color-primary);">Review</button>
                </td>
            </tr>
            <tr id="review-${name}" style="display:none;"><td colspan="4"><div class="expandable-content" id="content-${name}"></div></td></tr>
        `;
        tbody.insertAdjacentHTML('beforeend', row);
    }
});

function bulkUpdate(type, val) {
    if(!val) return;
    document.querySelectorAll(`.${type}-select`).forEach(s => s.value = val);
}

async function review(name, btn) {
    const row = document.getElementById(`review-${name}`);
    if(row.style.display === 'table-row') { row.style.display = 'none'; return; }
    
    row.style.display = 'table-row';
    const content = document.getElementById(`content-${name}`);
    content.innerHTML = '<div class="m3-loader">Analyzing branches...</div>';
    
    const res = await fetch(`/api/repo-details?repo=${name}`);
    const data = await res.json();
    
    content.innerHTML = `
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:24px;">
            <div>
                <strong>Commits</strong>
                <ul style="font-size:12px;">${data.commits.map(c => `<li>${c.message}</li>`).join('')}</ul>
            </div>
            <div>
                <strong>Files</strong>
                <div style="display:flex; flex-wrap:wrap; gap:4px;">${data.files.map(f => `<span class="status-badge" style="background:#eee">${f}</span>`).join('')}</div>
                <div style="margin-top:16px; display:flex; gap:8px;">
                    <button class="m3-button">Raise PR</button>
                    <button class="m3-button" style="background:#eee; color:#333;">Auto-Deploy</button>
                </div>
            </div>
        </div>
    `;
}
</script>
{% endblock %}
