{% extends "base.html" %}
{% block title %}Discovery{% endblock %}
{% block content %}
<div class="m3-card">
    <h1>Beyond Native: Discovery</h1>
    <div style="display:flex; gap:12px;">
        <input type="text" id="prefix" class="m3-input" placeholder="Enter repo prefix...">
        <button class="m3-button" onclick="searchRepos()"><i class="material-icons">search</i> Search</button>
    </div>
    <div class="progress-container" id="prog-cont"><div class="progress-bar" id="prog-bar"></div></div>
</div>

<div class="table-container" id="table-wrapper" style="display:none; margin-top:24px;">
    <table class="m3-table">
        <thead>
            <tr>
                <th><input type="checkbox" onclick="toggleAll(this)"></th>
                <th>Repository Name</th>
                <th>Project</th>
                <th>Link</th>
            </tr>
        </thead>
        <tbody id="repo-body"></tbody>
    </table>
</div>

<div id="selection-panel" class="selection-panel">
    <span id="selected-text">0 Repositories Selected</span>
    <button class="m3-button" style="background:white; color:var(--md-sys-color-primary);" onclick="proceed()">
        Next: Configure PRs <i class="material-icons">chevron_right</i>
    </button>
</div>

<script>
async function searchRepos() {
    const bar = document.getElementById('prog-bar');
    document.getElementById('prog-cont').style.display = 'block';
    bar.style.width = '40%';
    
    const res = await fetch('/api/extract-repos', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({prefix: document.getElementById('prefix').value})
    });
    const data = await res.json();
    bar.style.width = '100%';
    
    const tbody = document.getElementById('repo-body');
    tbody.innerHTML = data.repositories.map(r => `
        <tr>
            <td><input type="checkbox" class="repo-check" value="${r.name}" onchange="syncUI()"></td>
            <td><strong>${r.name}</strong></td>
            <td>${r.project}</td>
            <td><a href="${r.url}" target="_blank"><i class="material-icons">open_in_new</i></a></td>
        </tr>
    `).join('');
    document.getElementById('table-wrapper').style.display = 'block';
    setTimeout(() => document.getElementById('prog-cont').style.display = 'none', 500);
}

function toggleAll(master) {
    document.querySelectorAll('.repo-check').forEach(c => c.checked = master.checked);
    syncUI();
}

function syncUI() {
    const count = document.querySelectorAll('.repo-check:checked').length;
    document.getElementById('selected-text').innerText = `${count} Repositories Selected`;
    document.getElementById('selection-panel').classList.toggle('active', count > 0);
}

function proceed() {
    const selected = Array.from(document.querySelectorAll('.repo-check:checked')).map(c => c.value);
    sessionStorage.setItem('selectedRepos', JSON.stringify(selected));
    window.location.href = '/devops/bulk-pr';
}
</script>
{% endblock %}
