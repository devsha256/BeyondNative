<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Beyond Native | {% block title %}{% endblock %}</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div class="app-container">
        <nav class="nav-drawer">
            <div class="nav-header">
                <a href="/" style="text-decoration: none; color: inherit;">
                    <h2>Beyond Native</h2>
                </a>
            </div>
            
            <div class="accordion-item">
                <div class="accordion-header" id="head-devops" onclick="toggleAccordion('content-devops', 'head-devops')">
                    <span style="display:flex; align-items:center; gap:12px;"><i class="material-icons">lan</i> DevOps Suite</span>
                    <i class="material-icons">expand_more</i>
                </div>
                <div id="content-devops" class="accordion-content">
                    <a href="/devops" class="nav-sub-item">Overview</a>
                    <a href="/devops/bulk-pr" class="nav-sub-item">Bulk PRs</a>
                </div>
            </div>

            <div class="accordion-item">
                <div class="accordion-header" id="head-mule" onclick="toggleAccordion('content-mule', 'head-mule')">
                    <span style="display:flex; align-items:center; gap:12px;"><i class="material-icons">api</i> MuleSoft Suite</span>
                    <i class="material-icons">expand_more</i>
                </div>
                <div id="content-mule" class="accordion-content">
                    <a href="/mulesoft" class="nav-sub-item">Overview</a>
                    <a href="/mulesoft/runtime-control" class="nav-sub-item">Runtime Control</a>
                    <a href="/mulesoft/version-comparator" class="nav-sub-item">Version Compare</a>
                </div>
            </div>

            <div class="accordion-item">
                <div class="accordion-header" id="head-postman" onclick="toggleAccordion('content-postman', 'head-postman')">
                    <span style="display:flex; align-items:center; gap:12px;"><i class="material-icons">send</i> Postman Suite</span>
                    <i class="material-icons">expand_more</i>
                </div>
                <div id="content-postman" class="accordion-content">
                    <a href="/postman" class="nav-sub-item">Overview</a>
                    <a href="/postman/runner" class="nav-sub-item">Collection Runner</a>
                    <a href="/postman/log-report" class="nav-sub-item">Log Report</a>
                </div>
            </div>
            
            <div style="margin-top: auto; padding: 24px; border-top: 1px solid var(--border-light); display: flex; gap: 12px;">
                <button title="Toggle Theme" onclick="toggleTheme()" style="background: transparent; border: none; padding: 12px; border-radius: 12px; cursor: pointer; flex: 1; display: flex; justify-content: center; align-items: center; color: var(--text-main); transition: background 0.2s ease;">
                    <i id="theme-icon" class="material-icons" style="font-size: 24px;">dark_mode</i> 
                </button>
                <a href="/settings" title="Settings" style="background: transparent; border: none; padding: 12px; border-radius: 12px; cursor: pointer; flex: 1; display: flex; justify-content: center; align-items: center; color: var(--text-main); text-decoration: none; transition: background 0.2s ease;">
                    <i class="material-icons" style="font-size: 24px;">settings</i> 
                </a>
            </div>
        </nav>
        <main>
            {% block content %}{% endblock %}
        </main>
    </div>
    <script>
        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            const icon = document.getElementById('theme-icon');
            const text = document.getElementById('theme-text');
            if (icon && text) {
                if (theme === 'dark') {
                    icon.innerText = 'light_mode';
                    text.innerText = 'Switch to Light Mode';
                } else {
                    icon.innerText = 'dark_mode';
                    text.innerText = 'Switch to Dark Mode';
                }
            }
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const target = current === 'dark' ? 'light' : 'dark';
            localStorage.setItem('bn-theme', target);
            applyTheme(target);
        }

        const savedTheme = localStorage.getItem('bn-theme');
        if (savedTheme) {
            applyTheme(savedTheme);
        } else {
            const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            applyTheme(isDark ? 'dark' : 'light');
        }

        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
            if (!localStorage.getItem('bn-theme')) {
                applyTheme(e.matches ? 'dark' : 'light');
            }
        });

        function toggleAccordion(contentId, headId) {
            const content = document.getElementById(contentId);
            const head = document.getElementById(headId);
            const isShowing = content.classList.contains('show');
            document.querySelectorAll('.accordion-content').forEach(el => el.classList.remove('show'));
            document.querySelectorAll('.accordion-header').forEach(el => el.classList.remove('active'));
            if (!isShowing) { content.classList.add('show'); head.classList.add('active'); }
        }

        window.onload = () => {
            const path = window.location.pathname;
            if (path.includes('devops')) toggleAccordion('content-devops', 'head-devops');
            if (path.includes('mulesoft')) toggleAccordion('content-mule', 'head-mule');
            if (path.includes('postman')) toggleAccordion('content-postman', 'head-postman');
        };
    </script>
</body>
</html>
