<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beyond Native | {% block title %}{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div class="app-container">
        <main>
            {% block content %}{% endblock %}
        </main>

        <nav class="nav-drawer">
            <div class="nav-header">
                <h2 class="brand-title">Beyond Native</h2>
                <span class="brand-subtitle">Developer Suite</span>
            </div>
            
            <div class="nav-section">
                <label>CORE SUITES</label>
                <a href="/" class="nav-item {% if 'devops' in request.path or request.path == '/' %}active{% endif %}">
                    <i class="material-icons">lan</i> DevOps Suite
                </a>
                <a href="#" class="nav-item">
                    <i class="material-icons">api</i> MuleSoft Suite
                </a>
            </div>

            <div class="nav-section">
                <label>SYSTEM</label>
                <a href="#" class="nav-item">
                    <i class="material-icons">history</i> Global Audit
                </a>
                <a href="#" class="nav-item">
                    <i class="material-icons">settings</i> Settings
                </a>
            </div>
        </nav>
    </div>

    {% block selection_panel %}{% endblock %}
</body>
</html>
