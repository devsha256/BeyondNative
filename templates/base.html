<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Beyond Native | {% block title %}{% endblock %}</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');

        :root {
            --m3-primary: #6750A4;
            --m3-surface: rgba(254, 247, 255, 0.9);
            --m3-on-surface: #1D1B20;
            --m3-outline: rgba(121, 116, 126, 0.2);
            --m3-primary-container: #EADDFF;
            --m3-on-primary-container: #21005D;
            --bg-main: #fdf7ff;
            --text-main: #1d1b20;
        }

        [data-theme='dark'] {
            --m3-surface: rgba(28, 27, 31, 0.9);
            --m3-on-surface: #E6E1E5;
            --m3-primary-container: #4F378B;
            --m3-on-primary-container: #EADDFF;
            --bg-main: #141218;
            --text-main: #e6e1e5;
        }

        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background: var(--bg-main);
            color: var(--text-main);
            overflow: hidden;
        }

        .m3-app-layout {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        .m3-navigation-drawer {
            width: 280px;
            background: var(--m3-surface);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--m3-outline);
            display: flex;
            flex-direction: column;
            z-index: 1000;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Prevent initial transition jitter */
        .rail-init #main-sidebar { 
            width: 88px; 
            transition: none !important; 
        }
        .rail-init #main-sidebar * { transition: none !important; }
        
        /* Actual Rail Mode class used for ongoing toggles */
        .rail-mode.m3-navigation-drawer { width: 88px; }

        /* Brand Section */
        .m3-nav-brand {
            padding: 32px 24px;
        }

        .brand-link {
            display: flex;
            align-items: center;
            gap: 16px;
            text-decoration: none;
            color: var(--m3-on-surface);
        }

        .brand-logo {
            width: 40px;
            height: 40px;
            background: var(--m3-primary);
            color: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(103, 80, 164, 0.3);
        }

        .brand-text {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .brand-text span { color: var(--m3-primary); }

        /* Nav Content */
        .m3-nav-content {
            flex: 1;
            padding: 0 12px;
            overflow-y: auto;
        }

        .m3-nav-group {
            margin-bottom: 8px;
        }

        .m3-nav-item.parent {
            height: 56px;
            padding: 0 16px 0 24px;
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: 0.2s;
            color: var(--m3-on-surface);
            opacity: 0.8;
        }

        .m3-nav-item.parent:hover {
            background: rgba(103, 80, 164, 0.05);
            opacity: 1;
        }

        .item-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .item-container i { font-size: 24px; }
        .item-container .label { font-size: 14px; font-weight: 600; }

        .chevron { transition: 0.3s; font-size: 20px; opacity: 0.5; }

        /* Sub Items */
        .m3-nav-sub {
            max-height: 0;
            overflow: hidden;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding-left: 20px;
        }

        .m3-nav-group.active .m3-nav-sub {
            max-height: 500px;
            margin-top: 4px;
            margin-bottom: 12px;
        }

        .m3-nav-group.active .chevron { transform: rotate(180deg); }

        /* Rail Mode Transitions */
        .rail-mode.m3-navigation-drawer { width: 88px; }
        .rail-mode .brand-text, .rail-mode .parent .label, .rail-mode .chevron, .rail-mode .nav-ctrl-label { display: none; }
        .rail-mode .m3-nav-brand { padding: 32px 0; justify-content: center; display: flex; }
        .rail-mode .m3-nav-content { padding: 0 12px; overflow: visible; }
        .rail-mode .m3-nav-item.parent { padding: 0; justify-content: center; height: 56px; width: 56px; margin: 0 auto; }
        .rail-mode .sub-item .label { display: none; }
        .rail-mode .sub-item { padding: 0; justify-content: center; width: 44px; height: 44px; margin: 4px auto; }
        .rail-mode .m3-nav-sub { 
            position: absolute; 
            left: 64px;
            top: 0;
            background: var(--surface-m3);
            backdrop-filter: blur(30px);
            border: 1px solid var(--border-light);
            border-radius: 24px;
            padding: 12px;
            width: 220px;
            max-height: none !important;
            display: none;
            box-shadow: 20px 0 60px rgba(0,0,0,0.2);
            z-index: 9999;
            overflow: visible;
        }
        .rail-mode .m3-nav-group:hover .m3-nav-sub { display: block; }
        .rail-mode .m3-nav-group:hover .m3-nav-sub .label { display: block; }
        .rail-mode .m3-nav-group:hover .m3-nav-sub .sub-item { width: 100%; justify-content: flex-start; padding: 0 16px; gap: 12px; }
        .rail-mode .m3-nav-group { position: relative; }

        /* Global Controls */
        .m3-nav-controls {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 0 12px 16px 12px;
            margin-bottom: 8px;
            border-bottom: 1px solid var(--m3-outline);
        }
        .ctrl-btn {
            flex: 1;
            height: 32px;
            border-radius: 8px;
            border: none;
            background: transparent;
            color: var(--m3-on-surface);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            opacity: 0.5;
        }
        .ctrl-btn:hover { background: rgba(103, 80, 164, 0.05); opacity: 1; }
        .ctrl-btn i { font-size: 18px; }
        .rail-mode .m3-nav-controls { flex-direction: column; gap: 8px; border-bottom: none; }
        .rail-mode .m3-nav-footer { flex-direction: column-reverse; padding: 24px 0; gap: 16px; }
        .rail-mode .footer-divider { display: none; }

        .sub-item {
            height: 48px;
            display: flex;
            align-items: center;
            gap: 16px;
            text-decoration: none;
            color: var(--m3-on-surface);
            padding-left: 24px;
            border-radius: 24px;
            transition: 0.1s;
            margin-bottom: 2px;
        }

        .sub-item .label { font-size: 13px; font-weight: 500; opacity: 0.7; }
        
        .sub-item:hover {
            background: rgba(103, 80, 164, 0.05);
        }

        .sub-item.active {
            background: var(--m3-primary-container);
            color: var(--m3-on-primary-container) !important;
        }

        .sub-item.active .label { opacity: 1; font-weight: 700; }

        /* Footer */
        .m3-nav-footer {
            padding: 24px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: auto;
        }

        .m3-rail-action {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            border: none;
            background: rgba(103, 80, 164, 0.05);
            color: var(--m3-on-surface);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
        }

        .m3-rail-action:hover {
            background: var(--m3-primary);
            color: white;
            box-shadow: 0 8px 16px rgba(103, 80, 164, 0.2);
            transform: translateY(-2px);
        }

        .footer-divider {
            width: 1px;
            height: 24px;
            background: var(--m3-outline);
            opacity: 0.3;
        }

        .theme-icon-container { transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .m3-rail-action:hover .theme-icon-container { transform: rotate(45deg); }

        /* Main Viewport */
        .m3-main-viewport {
            flex: 1;
            overflow-y: auto;
            position: relative;
            background: var(--bg-main);
        }
    </style>
</head>
<body>
    <script>
        // Resolve Rail Mode BEFORE paint to prevent jitters
        if (localStorage.getItem('bn-rail-mode') === 'true') {
            document.body.classList.add('rail-init');
        }
    </script>
    <div class="m3-app-layout">
        <aside class="m3-navigation-drawer" id="main-sidebar">
            <div class="m3-nav-brand">
                <a href="/" class="brand-link">
                    <div class="brand-logo">
                        <i class="material-icons">rocket_launch</i>
                    </div>
                    <span class="brand-text">Beyond <span>Native</span></span>
                </a>
            </div>

            <div class="m3-nav-controls">
                <button class="ctrl-btn" onclick="expandAllNav()" title="Expand All Scopes">
                    <i class="material-icons">unfold_more</i>
                </button>
                <button class="ctrl-btn" onclick="collapseAllNav()" title="Collapse All Scopes">
                    <i class="material-icons">unfold_less</i>
                </button>
                <div class="footer-divider" style="height: 16px;"></div>
                <button class="ctrl-btn" onclick="toggleRailMode()" title="Toggle Rail Mode">
                    <i class="material-icons" id="rail-toggle-icon">view_sidebar</i>
                </button>
            </div>

            <div class="m3-nav-content">
                <!-- DevOps Suite -->
                <div class="m3-nav-group" id="group-devops">
                    <div class="m3-nav-item parent" onclick="toggleM3Nav('group-devops')">
                        <div class="item-container">
                            <i class="material-icons">lan</i>
                            <span class="label">DevOps Suite</span>
                        </div>
                        <i class="material-icons chevron">expand_more</i>
                    </div>
                    <div class="m3-nav-sub">
                        <a href="/devops" class="sub-item">
                            <span class="label">Overview</span>
                        </a>
                        <a href="/devops/bulk-pr" class="sub-item">
                            <span class="label">Bulk PRs</span>
                        </a>
                    </div>
                </div>

                <!-- MuleSoft Suite -->
                <div class="m3-nav-group" id="group-mulesoft">
                    <div class="m3-nav-item parent" onclick="toggleM3Nav('group-mulesoft')">
                        <div class="item-container">
                            <i class="material-icons">api</i>
                            <span class="label">MuleSoft Suite</span>
                        </div>
                        <i class="material-icons chevron">expand_more</i>
                    </div>
                    <div class="m3-nav-sub">
                        <a href="/mulesoft" class="sub-item">
                            <span class="label">Overview</span>
                        </a>
                        <a href="/mulesoft/runtime-control" class="sub-item">
                            <span class="label">Runtime Control</span>
                        </a>
                        <a href="/mulesoft/version-comparator" class="sub-item">
                            <span class="label">Version Compare</span>
                        </a>
                    </div>
                </div>

                <!-- Postman Suite -->
                <div class="m3-nav-group" id="group-postman">
                    <div class="m3-nav-item parent" onclick="toggleM3Nav('group-postman')">
                        <div class="item-container">
                            <i class="material-icons">send</i>
                            <span class="label">Postman Suite</span>
                        </div>
                        <i class="material-icons chevron">expand_more</i>
                    </div>
                    <div class="m3-nav-sub">
                        <a href="/postman" class="sub-item">
                            <span class="label">Overview</span>
                        </a>
                        <a href="/postman/runner" class="sub-item">
                            <span class="label">Runner</span>
                        </a>
                        <a href="/postman/log-report" class="sub-item">
                            <span class="label">Logs</span>
                        </a>
                        <a href="/postman/compare" class="sub-item">
                            <span class="label">Comparison</span>
                        </a>
                    </div>
                </div>
            </div>

            <div class="m3-nav-footer">
                <button class="m3-rail-action theme-toggle" onclick="toggleTheme()" title="Switch Appearance">
                    <div class="theme-icon-container">
                        <i id="theme-icon" class="material-icons">dark_mode</i>
                    </div>
                </button>
                <div class="footer-divider"></div>
                <a href="/settings" class="m3-rail-action settings-btn" title="System Settings">
                    <i class="material-icons">settings</i>
                </a>
            </div>
        </aside>

        <main class="m3-main-viewport">
            {% block content %}{% endblock %}
        </main>
    </div>
    <script>
        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            const icon = document.getElementById('theme-icon');
            if (icon) {
                icon.innerText = theme === 'dark' ? 'wb_sunny' : 'nightlight_round';
            }
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const target = current === 'dark' ? 'light' : 'dark';
            localStorage.setItem('bn-theme', target);
            applyTheme(target);
        }

        const savedTheme = localStorage.getItem('bn-theme');
        if (savedTheme) {
            applyTheme(savedTheme);
        } else {
            const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            applyTheme(isDark ? 'dark' : 'light');
        }

        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
            if (!localStorage.getItem('bn-theme')) {
                applyTheme(e.matches ? 'dark' : 'light');
            }
        });

        function toggleM3Nav(groupId) {
            const group = document.getElementById(groupId);
            const isShowing = group.classList.contains('active');
            // If in rail mode, we handle via hover, but keep click for mobile/tablet feel
            document.querySelectorAll('.m3-nav-group').forEach(el => el.classList.remove('active'));
            if (!isShowing) group.classList.add('active');
        }

        function expandAllNav() {
            document.querySelectorAll('.m3-nav-group').forEach(el => el.classList.add('active'));
        }

        function collapseAllNav() {
            document.querySelectorAll('.m3-nav-group').forEach(el => el.classList.remove('active'));
        }

        function toggleRailMode() {
            const sidebar = document.getElementById('main-sidebar');
            // Remove init class if present to allow transitions again
            document.body.classList.remove('rail-init');
            const isRail = sidebar.classList.toggle('rail-mode');
            localStorage.setItem('bn-rail-mode', isRail ? 'true' : 'false');
            document.getElementById('rail-toggle-icon').innerText = isRail ? 'menu_open' : 'view_sidebar';
        }

        // Apply saved state to icons/sidebar class properly
        if (localStorage.getItem('bn-rail-mode') === 'true') {
            document.getElementById('main-sidebar').classList.add('rail-mode');
            const icon = document.getElementById('rail-toggle-icon');
            if (icon) icon.innerText = 'menu_open';
        }

        window.onload = () => {
            const path = window.location.pathname;
            document.querySelectorAll('.sub-item').forEach(el => el.classList.remove('active'));
            const activeLink = document.querySelector(`.sub-item[href="${path}"]`);
            if (activeLink) {
                activeLink.classList.add('active');
                const parentGroup = activeLink.closest('.m3-nav-group');
                if (parentGroup) {
                    parentGroup.classList.add('active');
                }
            }
        };
    </script>
</body>
</html>
