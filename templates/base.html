<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Beyond Native | {% block title %}{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div class="app-container">
        <main>{% block content %}{% endblock %}</main>

        <nav class="nav-drawer">
            <div class="nav-header">
                <h2 style="color:var(--md-sys-color-primary); margin:0;">Beyond Native</h2>
                <small style="color:#79747E;">Suite Manager v1.0</small>
            </div>
            
            <div class="accordion-item">
                <div class="accordion-header" id="head-devops" onclick="toggleAccordion('content-devops', 'head-devops')">
                    <span style="display:flex; align-items:center; gap:12px;"><i class="material-icons">lan</i> DevOps Suite</span>
                    <i class="material-icons">expand_more</i>
                </div>
                <div id="content-devops" class="accordion-content">
                    <a href="/devops" class="nav-sub-item">Overview</a>
                    <a href="/devops/discovery" class="nav-sub-item">Repo Discovery</a>
                    <a href="/devops/bulk-pr" class="nav-sub-item">Bulk PR Automator</a>
                </div>
            </div>

            <div class="accordion-item">
                <div class="accordion-header" id="head-mule" onclick="toggleAccordion('content-mule', 'head-mule')">
                    <span style="display:flex; align-items:center; gap:12px;"><i class="material-icons">api</i> MuleSoft Suite</span>
                    <i class="material-icons">expand_more</i>
                </div>
                <div id="content-mule" class="accordion-content">
                    <a href="/mulesoft" class="nav-sub-item">Overview</a>
                    <a href="/mulesoft/runtime-control" class="nav-sub-item">Runtime Control</a>
                    <a href="/mulesoft/version-comparator" class="nav-sub-item">Version Compare</a>
                </div>
            </div>
        </nav>
    </div>

    <script>
        function toggleAccordion(contentId, headId) {
            const content = document.getElementById(contentId);
            const head = document.getElementById(headId);
            const isShowing = content.classList.contains('show');
            
            // Close others (Optional: for strict accordion behavior)
            document.querySelectorAll('.accordion-content').forEach(el => el.classList.remove('show'));
            document.querySelectorAll('.accordion-header').forEach(el => el.classList.remove('active'));

            if (!isShowing) {
                content.classList.add('show');
                head.classList.add('active');
            }
        }
        
        // Auto-expand based on URL
        window.onload = () => {
            const path = window.location.pathname;
            if (path.includes('devops')) toggleAccordion('content-devops', 'head-devops');
            if (path.includes('mulesoft')) toggleAccordion('content-mule', 'head-mule');
        };
    </script>
</body>
</html>
