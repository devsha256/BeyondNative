<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azure DevOps Automator | {% block title %}{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="app-container">
        <main>
            {% block content %}{% endblock %}
        </main>

        <nav class="nav-drawer">
            <div style="padding-left: 16px; margin-bottom: 32px;">
                <h2 style="font-size: 1.4rem; color: var(--md-sys-color-primary);">DevOps Suite</h2>
            </div>
            
            <a href="/" class="nav-item {% if request.path == '/' %}active{% endif %}">
                <i class="material-icons">rocket_launch</i> Bulk PRs
            </a>
            <a href="#" class="nav-item">
                <i class="material-icons">history</i> Audit Logs
            </a>
            <a href="#" class="nav-item">
                <i class="material-icons">settings</i> Settings
            </a>
        </nav>
    </div>
</body>
</html>
