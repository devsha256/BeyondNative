<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Beyond Native | {% block title %}{% endblock %}</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div class="m3-app-layout">
        <aside class="m3-navigation-drawer">
            <div class="m3-nav-brand">
                <a href="/" class="brand-link">
                    <div class="brand-logo">
                        <i class="material-icons">rocket_launch</i>
                    </div>
                    <span class="brand-text">Beyond <span>Native</span></span>
                </a>
            </div>

            <div class="m3-nav-content">
                <!-- DevOps Suite -->
                <div class="m3-nav-group" id="group-devops">
                    <div class="m3-nav-item parent" onclick="toggleM3Nav('group-devops')">
                        <div class="item-container">
                            <i class="material-icons">lan</i>
                            <span class="label">DevOps Suite</span>
                        </div>
                        <i class="material-icons chevron">expand_more</i>
                    </div>
                    <div class="m3-nav-sub">
                        <a href="/devops" class="sub-item">
                            <span class="indicator"></span>
                            <span class="label">Overview</span>
                        </a>
                        <a href="/devops/bulk-pr" class="sub-item">
                            <span class="indicator"></span>
                            <span class="label">Bulk PRs</span>
                        </a>
                    </div>
                </div>

                <!-- MuleSoft Suite -->
                <div class="m3-nav-group" id="group-mulesoft">
                    <div class="m3-nav-item parent" onclick="toggleM3Nav('group-mulesoft')">
                        <div class="item-container">
                            <i class="material-icons">api</i>
                            <span class="label">MuleSoft Suite</span>
                        </div>
                        <i class="material-icons chevron">expand_more</i>
                    </div>
                    <div class="m3-nav-sub">
                        <a href="/mulesoft" class="sub-item">
                            <span class="indicator"></span>
                            <span class="label">Overview</span>
                        </a>
                        <a href="/mulesoft/runtime-control" class="sub-item">
                            <span class="indicator"></span>
                            <span class="label">Runtime Control</span>
                        </a>
                        <a href="/mulesoft/version-comparator" class="sub-item">
                            <span class="indicator"></span>
                            <span class="label">Version Compare</span>
                        </a>
                    </div>
                </div>

                <!-- Postman Suite -->
                <div class="m3-nav-group active" id="group-postman">
                    <div class="m3-nav-item parent" onclick="toggleM3Nav('group-postman')">
                        <div class="item-container">
                            <i class="material-icons">send</i>
                            <span class="label">Postman Suite</span>
                        </div>
                        <i class="material-icons chevron">expand_more</i>
                    </div>
                    <div class="m3-nav-sub">
                        <a href="/postman" class="sub-item">
                            <span class="indicator"></span>
                            <span class="label">Overview</span>
                        </a>
                        <a href="/postman/runner" class="sub-item">
                            <span class="indicator"></span>
                            <span class="label">Runner</span>
                        </a>
                        <a href="/postman/log-report" class="sub-item">
                            <span class="indicator"></span>
                            <span class="label">Logs</span>
                        </a>
                        <a href="/postman/compare" class="sub-item">
                            <span class="indicator"></span>
                            <span class="label">Comparison</span>
                        </a>
                    </div>
                </div>
            </div>

            <div class="m3-nav-footer">
                <button class="m3-rail-action" onclick="toggleTheme()" title="Toggle Theme">
                    <i id="theme-icon" class="material-icons">dark_mode</i>
                </button>
                <a href="/settings" class="m3-rail-action" title="Settings">
                    <i class="material-icons">settings</i>
                </a>
            </div>
        </aside>

        <main class="m3-main-viewport">
            {% block content %}{% endblock %}
        </main>
    </div>
    <script>
        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            const icon = document.getElementById('theme-icon');
            const text = document.getElementById('theme-text');
            if (icon && text) {
                if (theme === 'dark') {
                    icon.innerText = 'light_mode';
                    text.innerText = 'Switch to Light Mode';
                } else {
                    icon.innerText = 'dark_mode';
                    text.innerText = 'Switch to Dark Mode';
                }
            }
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const target = current === 'dark' ? 'light' : 'dark';
            localStorage.setItem('bn-theme', target);
            applyTheme(target);
        }

        const savedTheme = localStorage.getItem('bn-theme');
        if (savedTheme) {
            applyTheme(savedTheme);
        } else {
            const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            applyTheme(isDark ? 'dark' : 'light');
        }

        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
            if (!localStorage.getItem('bn-theme')) {
                applyTheme(e.matches ? 'dark' : 'light');
            }
        });

        function toggleAccordion(contentId, headId) {
            const content = document.getElementById(contentId);
            const head = document.getElementById(headId);
            const isShowing = content.classList.contains('show');
            document.querySelectorAll('.accordion-content').forEach(el => el.classList.remove('show'));
            document.querySelectorAll('.accordion-header').forEach(el => el.classList.remove('active'));
            if (!isShowing) { content.classList.add('show'); head.classList.add('active'); }
        }

        window.onload = () => {
            const path = window.location.pathname;
            if (path.includes('devops')) toggleAccordion('content-devops', 'head-devops');
            if (path.includes('mulesoft')) toggleAccordion('content-mule', 'head-mule');
            if (path.includes('postman')) toggleAccordion('content-postman', 'head-postman');
        };
    </script>
</body>
</html>
