<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Beyond Native | {% block title %}{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div class="app-container">
        <main>{% block content %}{% endblock %}</main>

        <nav class="nav-drawer">
            <h2 style="color:var(--md-sys-color-primary); padding-left:16px;">Beyond Native</h2>
            
            <div class="nav-section">
                <div class="accordion-header" onclick="toggleAccordion('devops-menu')">
                    <span style="display:flex; align-items:center; gap:12px;"><i class="material-icons">lan</i> DevOps Suite</span>
                    <i class="material-icons">expand_more</i>
                </div>
                <div id="devops-menu" class="accordion-content {% if 'devops' in request.path or request.path == '/' %}open{% endif %}">
                    <a href="/" class="nav-item">Discovery</a>
                    <a href="/devops/bulk-pr" class="nav-item">Bulk PRs</a>
                </div>
            </div>

            <div class="nav-section">
                <div class="accordion-header" onclick="toggleAccordion('mule-menu')">
                    <span style="display:flex; align-items:center; gap:12px;"><i class="material-icons">api</i> MuleSoft Suite</span>
                    <i class="material-icons">expand_more</i>
                </div>
                <div id="mule-menu" class="accordion-content {% if 'mulesoft' in request.path %}open{% endif %}">
                    <a href="/mulesoft" class="nav-item">Suite Overview</a>
                    <a href="/mulesoft/runtime-control" class="nav-item">Start/Stop Apps</a>
                    <a href="/mulesoft/version-comparator" class="nav-item">Version Compare</a>
                </div>
            </div>
        </nav>
    </div>

    <script>
        function toggleAccordion(id) {
            document.getElementById(id).classList.toggle('open');
        }
    </script>
</body>
</html>
